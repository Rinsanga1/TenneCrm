<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tenne CRM</title>
  <style>
    :root {
      --bg:       #282828;
      --bg-hard:  #1d2021;
      --bg-soft:  #32302f;
      --bg1:      #3c3836;
      --bg2:      #504945;
      --bg3:      #665c54;
      --bg4:      #7c6f64;
      --fg:       #ebdbb2;
      --fg1:      #ebdbb2;
      --fg2:      #d5c4a1;
      --fg3:      #bdae93;
      --fg4:      #a89984;
      --red:      #cc241d;
      --red-b:    #fb4934;
      --green:    #98971a;
      --green-b:  #b8bb26;
      --yellow:   #d79921;
      --yellow-b: #fabd2f;
      --blue:     #458588;
      --blue-b:   #83a598;
      --purple:   #b16286;
      --purple-b: #d3869b;
      --aqua:     #689d6a;
      --aqua-b:   #8ec07c;
      --orange:   #d65d0e;
      --orange-b: #fe8019;
      --sidebar-width: 220px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    #root { display: flex; height: 100vh; overflow: hidden; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; }
    input, textarea, select { font-family: inherit; font-size: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
